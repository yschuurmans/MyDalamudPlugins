name: Regenerate PluginMaster
on: 
  workflow_dispatch:
  push:
    branches:
    - master
    - api4
    paths-ignore:
    - personalpluginmaster.json
    - personalpluginmaster.sources.json
    - generate_personal_pluginmaster.py
    - .github/workflows/regenerate_personal_pluginmaster.yml
concurrency: regenerate
jobs:
  generate:
    name: Regenerate PluginMaster
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v2
        with:
            python-version: '3.8'
      - uses: actions/checkout@v2
      - name: Generate PluginMaster
        run: python generate_pluginmaster.py
      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet --exit-code; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
      - uses: EndBug/add-and-commit@v9
        if: steps.changes.outputs.has_changes == 'true'
        with:
          message: Regenerate PluginMaster
